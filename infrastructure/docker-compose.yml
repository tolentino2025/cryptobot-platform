# ═══════════════════════════════════════════════════════════════
# CRYPTOBOT PLATFORM — Docker Compose (Local Development)
# Runs PostgreSQL, Redis, API, and Dashboard
# ═══════════════════════════════════════════════════════════════

version: '3.9'

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: cryptobot-postgres
    environment:
      POSTGRES_DB: cryptobot
      POSTGRES_USER: cryptobot
      POSTGRES_PASSWORD: cryptobot_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptobot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: cryptobot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── API Server ──
  api:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.api
    container_name: cryptobot-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://cryptobot:cryptobot_dev@postgres:5432/cryptobot
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"
    restart: unless-stopped

  # ── Dashboard ──
  web:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.web
    container_name: cryptobot-web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
